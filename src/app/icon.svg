<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Monograma KK — Keila Karelle.
    Serif itálico, estilo assinatura (padrão das capas de destaque do
    Instagram): dois K sobrepostos em dourado e dourado-claro sobre o preto
    do site, com fio dourado discreto na borda.
  -->
  <rect width="64" height="64" rx="14" fill="#141211"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="12" fill="none" stroke="#c8a96a" stroke-opacity="0.35"/>
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="40">
    <text x="12" y="46" fill="#c8a96a">K</text>
    <text x="27" y="46" fill="#dfc691">K</text>
  </g>
</svg>
